<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Producto | Savia Col.</title>
    <meta
      name="description"
      content="Ficha dinámica de producto para Savia Col. con precio, familia, uso recomendado, tags comerciales y navegación optimizada para mobile."
    />
    <meta name="robots" content="index,follow" />
    <link rel="icon" href="../assets/img/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="../assets/css/styles.css" />
    <script src="../assets/js/main.js" defer></script>
  </head>
  <body
    data-page="producto"
    data-root=".."
    data-language="es"
    data-title-es="Producto | Savia Col."
    data-title-en="Product | Savia Col."
    data-desc-es="Ficha dinámica de producto para Savia Col. con precio, familia, uso recomendado, tags comerciales y navegación optimizada para mobile."
    data-desc-en="Dynamic Savia Col. product sheet with price, family, recommended use, commercial tags and mobile-optimized navigation."
  >
    <div id="site-header"></div>

    <main id="contenido-principal" class="page">
      <section class="container section">
        <div id="product-shell"></div>
      </section>

      <section class="container section">
        <div class="section-head">
          <div>
            <p class="kicker">
              <span class="lang-es">Lectura rápida</span>
              <span class="lang-en">Quick read</span>
            </p>
            <h2>
              <span class="lang-es">Tres bloques para decidir sin fricción.</span>
              <span class="lang-en">Three blocks to decide without friction.</span>
            </h2>
          </div>
        </div>
        <div id="product-benefits" class="grid-3"></div>
      </section>

      <section class="container section">
        <div id="product-extra" class="info-grid"></div>
      </section>

      <section class="container section">
        <div class="section-head">
          <div>
            <p class="kicker">
              <span class="lang-es">También podría gustarte</span>
              <span class="lang-en">You may also like</span>
            </p>
            <h2>
              <span class="lang-es">Productos relacionados con una lógica más clara.</span>
              <span class="lang-en">Related products presented with a clearer logic.</span>
            </h2>
          </div>
          <a class="btn btn-secondary" href="catalogo.html">
            <span class="lang-es">Volver al catálogo</span>
            <span class="lang-en">Back to catalog</span>
          </a>
        </div>
        <div id="product-recommendations" class="product-grid"></div>
      </section>
    </main>

    <div id="site-footer"></div>
    <div class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
